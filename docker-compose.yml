version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: worksphere
      POSTGRES_USER: worksphere
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worksphere_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - worksphere-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worksphere -d worksphere"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://worksphere:${DB_PASSWORD:-worksphere_secret_2024}@db:5432/worksphere
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-ws_internal_2024_secret}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - worksphere-net
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_NAME: WorkSphere
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-ws_nextauth_secret_2024}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
      INTERNAL_API_URL: http://backend:5000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-ws_internal_2024_secret}
    depends_on:
      - backend
    networks:
      - worksphere-net
      - coolify
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTPS router
      - "traefik.http.routers.worksphere.rule=Host(`n6co0az1uzf7qcxxsmymtwiy.187.127.134.246.sslip.io`)"
      - "traefik.http.routers.worksphere.entrypoints=https"
      - "traefik.http.routers.worksphere.tls=true"
      - "traefik.http.routers.worksphere.tls.certresolver=letsencrypt"
      - "traefik.http.services.worksphere.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.worksphere-http.rule=Host(`n6co0az1uzf7qcxxsmymtwiy.187.127.134.246.sslip.io`)"
      - "traefik.http.routers.worksphere-http.entrypoints=http"
      - "traefik.http.routers.worksphere-http.middlewares=redirect-to-https@docker"

volumes:
  pgdata:

networks:
  worksphere-net:
    driver: bridge
  coolify:
    external: true
